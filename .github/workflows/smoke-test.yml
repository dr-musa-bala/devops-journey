name: Sanity & Smoke Test

on:
  push:
    branches: [ "main", "feat/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  smoke-test-job:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Download Repository Code
        uses: actions/checkout@v4

      - name: Step 2 - Check Runner System Info
        run: |
          echo "=========================================="
          echo "Running on OS: $(uname -a)"
          echo "Current Directory: $(pwd)"
          echo "=========================================="

      - name: Step 3 - Verify Repository Files
        run: |
          echo "Listing all files in repository:"
          ls -la

      - name: Step 4 - Verify Python Installation
        run: |
          echo "Checking if Python 3 is available on the runner:"
          python3 --version

# -------------------------------------------------------------
      # Cache Trivy Vulnerability DB (Speeds up scans by 2-3 mins)
      # -------------------------------------------------------------
      - name: Cache Trivy Vulnerability Database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-trivy-db-

      # -------------------------------------------------------------
      # Aqua Security Trivy Vulnerability Scan
      # -------------------------------------------------------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: 'local-scan-target:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
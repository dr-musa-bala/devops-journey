name: Continuous Integration Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: INFRASTRUCTURE COMPLIANCE
  # ==========================================
  validate-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Initialize Workspace
        run: terraform init -backend=false

      - name: Verify Code Formatting
        run: terraform fmt -check

      - name: Validate Syntax Structure
        run: terraform validate

  # ==========================================
  # JOB 2: APPLICATION CONTAINERIZATION & SECURITY
  # ==========================================
  build-application:
    runs-on: ubuntu-latest
    needs: validate-infrastructure

    services:
      floci:
        image: floci/floci:latest
        ports:
          - 4566:4566
        options: -v /var/run/docker.sock:/var/run/docker.sock

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      # Initialize ECR Repo in Emulator Control Plane
      - name: Initialize ECR Repo in Emulator
        run: |
          aws ecr create-repository --repository-name sillypets-app --region us-east-1 --endpoint-url http://localhost:4566
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      # Link the Buildx driver to the host network and map our unencrypted data plane on port 5100
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          config-inline: |
            [registry."000000000000.dkr.ecr.us-east-1.localhost:5100"]
              http = true
              insecure = true

      # 🚨 NEW STEP 1: Export compiled layers directly to the runner's local Docker daemon
      - name: Build Local Image for Security Analysis
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true 
          tags: sillypets-app:test

      # 🚨 NEW STEP 2: Execute Aqua Security Trivy static binary analysis
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: 'sillypets-app:test'
          format: 'table'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'          # <-- Hard gate: Fail pipeline if vulns are discovered
          ignore-unfixed: true    # <-- Ignore noise; only flag vulns with an available fix

      # Compile and Push Image to Local ECR Data Plane (runs instantly via BuildKit cache matching)
      - name: Compile and Push Image to Local ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            000000000000.dkr.ecr.us-east-1.localhost:5100/sillypets-app:latest
            000000000000.dkr.ecr.us-east-1.localhost:5100/sillypets-app:${{ github.sha }}
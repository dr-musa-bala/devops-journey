name: Continuous Integration Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: INFRASTRUCTURE COMPLIANCE
  # ==========================================
  validate-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Initialize Workspace
        run: terraform init -backend=false

      - name: Verify Code Formatting
        run: terraform fmt -check

      - name: Validate Syntax Structure
        run: terraform validate

  # ==========================================
  # JOB 2: APPLICATION CONTAINERIZATION
  # ==========================================
  build-application:
    runs-on: ubuntu-latest
    # DEPENDENCY RULE: Only run this job if the infrastructure checks pass perfectly
    needs: validate-infrastructure

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      # 1. Handshake with your emulated AWS environment
      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: "test"
          aws-secret-access-key: "test"
          aws-region: us-east-1

      # 2. Authenticate the local Docker engine with your ECR warehouse
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build the container and push it automatically using the dynamic registry name
      - name: Compile and Push Image to Amazon ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            000000000000.dkr.ecr.us-east-1.localhost:4566/sillypets-app:latest
            000000000000.dkr.ecr.us-east-1.localhost:4566/sillypets-app:${{ github.sha }}
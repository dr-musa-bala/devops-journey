name: Continuous Integration Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: INFRASTRUCTURE COMPLIANCE
  # ==========================================
  validate-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Initialize Workspace
        run: terraform init -backend=false

      - name: Verify Code Formatting
        run: terraform fmt -check

      - name: Validate Syntax Structure
        run: terraform validate

  # ==========================================
  # JOB 2: APPLICATION CONTAINERIZATION
  # ==========================================
  build-application:
    runs-on: ubuntu-latest
    needs: validate-infrastructure

    services:
      floci:
        image: floci/floci:latest
        ports:
          - 4566:4566
        options: -v /var/run/docker.sock:/var/run/docker.sock

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      # Create the repository inside the fresh emulator instance running on port 4566
      - name: Initialize ECR Repo in Emulator
        run: |
          aws ecr create-repository --repository-name sillypets-app --region us-east-1 --endpoint-url http://localhost:4566
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      # Link the Buildx driver to the host network so it can talk to port 4566
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # 🚨 ADDED: Explicit inline configuration to force plain HTTP for the emulator registry
        with:
          driver-opts: network=host
          config-inline: |
            [registry."000000000000.dkr.ecr.us-east-1.localhost:4566"]
              http = true
              insecure = true

      # Compile the container image and ship it into the isolated emulator repository using ECR naming patterns
      - name: Compile and Push Image to Local ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            000000000000.dkr.ecr.us-east-1.localhost:4566/sillypets-app:latest
            000000000000.dkr.ecr.us-east-1.localhost:4566/sillypets-app:${{ github.sha }}
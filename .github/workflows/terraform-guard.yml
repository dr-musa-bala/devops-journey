name: Continuous Integration & Deployment Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: INFRASTRUCTURE COMPLIANCE (CI)
  # ==========================================
  validate-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Initialize Workspace
        run: terraform init -backend=false

      - name: Verify Code Formatting
        run: terraform fmt -check

      - name: Validate Syntax Structure
        run: terraform validate

  # ==========================================
  # JOB 2: CONTAINERIZATION, SECURITY & DEPLOYMENT (CI/CD)
  # ==========================================
  build-application:
    runs-on: ubuntu-latest
    needs: validate-infrastructure

    services:
      floci:
        image: floci/floci:latest
        ports:
          - 4566:4566
        options: -v /var/run/docker.sock:/var/run/docker.sock

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      # Initialize ECR Repo in Emulator Control Plane
      - name: Initialize ECR Repo in Emulator
        run: |
          aws ecr create-repository --repository-name sillypets-app --region us-east-1 --endpoint-url http://localhost:4566
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      # Link the Buildx driver to the host network and map our unencrypted data plane on port 5100
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          config-inline: |
            [registry."000000000000.dkr.ecr.us-east-1.localhost:5100"]
              http = true
              insecure = true

      # Export compiled layers directly to the runner's local Docker daemon
      - name: Build Local Image for Security Analysis
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true 
          tags: sillypets-app:test

      # Run Trivy Vulnerability Scanner (Native Container)
      - name: Run Trivy Vulnerability Scanner (Native Container)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            sillypets-app:test

      # Compile and Push Image to Local ECR Data Plane
      - name: Compile and Push Image to Local ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            000000000000.dkr.ecr.us-east-1.localhost:5100/sillypets-app:latest
            000000000000.dkr.ecr.us-east-1.localhost:5100/sillypets-app:${{ github.sha }}

      # ==========================================
      # CONTINUOUS DEPLOYMENT (CD) PHASE
      # ==========================================
      - name: Set up Terraform CLI for Deployment
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # 🚨 FIX: Create a native override file to cleanly swap out the S3 backend for local state tracking
      - name: Create Native Backend Override for Sandbox
        run: |
          cat <<EOF > backend_override.tf
          terraform {
            backend "local" {}
          }
          EOF

      # Initialize using our clean local backend override map
      - name: Initialize Terraform Deployment
        run: terraform init

      - name: Deploy Container Infrastructure via Local Apply
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          TF_VAR_image_tag: ${{ github.sha }}